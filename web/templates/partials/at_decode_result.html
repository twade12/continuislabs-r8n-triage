{% if result %}
<div class="bg-slate-50 border border-slate-200 rounded p-3">
  <div class="text-xs text-slate-500 mb-1">Input</div>
  <div class="font-mono text-xs mb-2">{{ line }}</div>
  <div class="text-xs text-slate-500 mb-1">Decoded</div>
  <div class="text-sm whitespace-pre-wrap">{{ result }}</div>
</div>
{% else %}
<div class="bg-amber-50 border border-amber-200 rounded p-3 text-sm">
  No decoder registered for this line. Try one of: <span class="font-mono text-xs">+CEREG, +CSQ, +CESQ, +CGPADDR, +COPS, +CME ERROR, +QPING…</span>
</div>
{% endif %}
