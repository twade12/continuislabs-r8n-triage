{% extends "base.html" %}
{% block title %}New codex entry — r8n{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="/codex" class="text-xs text-brand-600 hover:underline">← back to codex</a>
</div>

<h1 class="text-2xl font-semibold mb-4">New codex entry</h1>

<form method="post" action="/codex" class="bg-white border border-slate-200 rounded-lg p-5 space-y-4 max-w-3xl">
  <input type="hidden" name="source_session_id" value="{{ prefill.get('source_session_id', '') }}">

  <div>
    <label class="block text-sm font-semibold mb-1">Title <span class="text-red-600">*</span></label>
    <input type="text" name="title" required value="{{ prefill.get('title', '') }}"
      class="w-full border border-slate-300 rounded p-2">
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-semibold mb-1">Vendor</label>
      <input type="text" name="vendor" value="{{ prefill.get('vendor', '') }}"
        class="w-full border border-slate-300 rounded p-2 font-mono text-sm" placeholder="quectel">
    </div>
    <div>
      <label class="block text-sm font-semibold mb-1">Module</label>
      <input type="text" name="module" value="{{ prefill.get('module', '') }}"
        class="w-full border border-slate-300 rounded p-2 font-mono text-sm" placeholder="BG95-M3">
    </div>
    <div>
      <label class="block text-sm font-semibold mb-1">Carrier</label>
      <input type="text" name="carrier" class="w-full border border-slate-300 rounded p-2 text-sm" placeholder="Verizon">
    </div>
    <div>
      <label class="block text-sm font-semibold mb-1">RAT</label>
      <input type="text" name="rat" class="w-full border border-slate-300 rounded p-2 text-sm font-mono" placeholder="cat-m1">
    </div>
  </div>

  <div>
    <label class="block text-sm font-semibold mb-1">Symptom tags <span class="text-slate-400 font-normal">(comma-separated)</span></label>
    <input type="text" name="symptom_tags" value="{{ prefill.get('symptom_tags', '') }}"
      class="w-full border border-slate-300 rounded p-2 text-sm font-mono"
      placeholder="registration_denied_hss, creg-0-3, cause-7">
  </div>

  <div>
    <label class="block text-sm font-semibold mb-1">Diagnosis</label>
    <textarea name="diagnosis" rows="4" class="w-full border border-slate-300 rounded p-2 text-sm">{{ prefill.get('diagnosis', '') }}</textarea>
  </div>

  <div>
    <label class="block text-sm font-semibold mb-1">Fix</label>
    <textarea name="fix" rows="4" class="w-full border border-slate-300 rounded p-2 text-sm" placeholder="step-by-step…"></textarea>
  </div>

  <div class="flex items-center gap-2">
    <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded text-sm">Save entry</button>
    <a href="/codex" class="text-sm text-slate-500 hover:underline">Cancel</a>
  </div>
</form>
{% endblock %}
